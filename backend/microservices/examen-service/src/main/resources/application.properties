spring.application.name=examen-service

spring.datasource.url=jdbc:mysql://localhost:3306/LinguaNova?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8086

# Eureka
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Feign
user-service.url=http://localhost:8082

spring.cloud.config.enabled=false
# Gemini API (quiz generation) - hardcoded for now, remove before committing
gemini.api.key=
